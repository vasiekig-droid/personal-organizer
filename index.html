<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#f7d7e8" />
  <title>Мой нежный органайзер</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="icon.svg" type="image/svg+xml" />
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <style>
    :root{
      --bg:#fff7fb; --panel:#ffffffcc; --panel-solid:#fff; --ink:#352432; --muted:#7b6475;
      --line:#f2d7e7; --pink:#f5a7cc; --pink2:#ffd8ea; --rose:#d94f8f; --lav:#d8ccff;
      --mint:#c8f3e0; --yellow:#fff0b8; --red:#ff5d7a; --green:#31a36b; --shadow:0 18px 50px #c85a9b22;
      --radius:24px;
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;color:var(--ink);background:
      radial-gradient(circle at 15% 5%, #ffd3eb 0 18%, transparent 35%),
      radial-gradient(circle at 90% 10%, #e8ddff 0 16%, transparent 38%),
      linear-gradient(135deg,#fff7fb,#fffdf8 55%,#f9f3ff);min-height:100vh;}
    .app{max-width:1180px;margin:0 auto;padding:18px 14px 96px}.top{display:flex;gap:14px;align-items:center;justify-content:space-between;margin-bottom:14px}.brand{display:flex;gap:12px;align-items:center}.logo{width:54px;height:54px;border-radius:18px;background:linear-gradient(145deg,#ffb8d8,#d8ccff);display:grid;place-items:center;box-shadow:var(--shadow);font-size:28px}.title h1{margin:0;font-size:clamp(22px,3vw,34px);line-height:1}.title p{margin:5px 0 0;color:var(--muted);font-size:14px}.statusbar{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}.pill{border:1px solid var(--line);background:#ffffffaa;border-radius:999px;padding:8px 12px;color:var(--muted);font-size:13px;backdrop-filter:blur(12px)}
    .tabs{position:sticky;top:0;z-index:5;display:flex;gap:8px;overflow:auto;padding:10px 0;margin-bottom:14px;background:linear-gradient(#fff7fbdd,#fff7fb88);backdrop-filter:blur(16px)}.tab{border:1px solid var(--line);background:#fff;border-radius:999px;padding:10px 14px;color:var(--muted);cursor:pointer;white-space:nowrap;font-weight:700}.tab.active{background:linear-gradient(135deg,var(--rose),#9b6bff);color:#fff;border-color:transparent;box-shadow:0 12px 26px #d94f8f30}
    .grid{display:grid;grid-template-columns:repeat(12,1fr);gap:14px}.card{grid-column:span 12;background:var(--panel);border:1px solid #ffffff80;border-radius:var(--radius);box-shadow:var(--shadow);padding:16px;backdrop-filter:blur(18px)}.card h2,.card h3{margin:0 0 12px}.two{grid-column:span 6}.three{grid-column:span 4}.four{grid-column:span 3}.wide{grid-column:span 8}.side{grid-column:span 4}
    .metric{display:flex;align-items:center;justify-content:space-between;gap:12px}.metric b{font-size:32px}.soft{color:var(--muted);font-size:13px}.row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}.stack{display:flex;flex-direction:column;gap:10px}.hidden{display:none!important}
    input,textarea,select{width:100%;border:1px solid var(--line);background:#fff;border-radius:16px;padding:12px 13px;font:inherit;color:var(--ink);outline:none}textarea{min-height:84px;resize:vertical}label{font-size:13px;color:var(--muted);font-weight:700;display:block;margin:0 0 5px}.fieldgrid{display:grid;grid-template-columns:repeat(12,1fr);gap:10px}.f12{grid-column:span 12}.f6{grid-column:span 6}.f4{grid-column:span 4}.f3{grid-column:span 3}
    button{border:0;border-radius:16px;padding:11px 14px;font-weight:800;cursor:pointer;color:var(--ink);background:#fff;border:1px solid var(--line)}button.primary{background:linear-gradient(135deg,var(--rose),#9b6bff);color:#fff;border:0}button.good{background:linear-gradient(135deg,#bdf1d9,#fff0b8);border:0}button.danger{background:#ffe7ed;color:#b42345;border-color:#ffc5d1}button.ghost{background:#ffffff90}.btns{display:flex;gap:8px;flex-wrap:wrap}
    .task{background:#fff;border:1px solid var(--line);border-radius:20px;padding:13px;display:grid;grid-template-columns:auto 1fr auto;gap:10px;align-items:start}.task.done{opacity:.62}.task input[type=checkbox]{width:22px;height:22px;margin-top:2px}.task h3{margin:0;font-size:16px}.task .meta{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}.chip{font-size:12px;border-radius:999px;padding:5px 8px;background:#fff3f8;border:1px solid var(--line);color:var(--muted)}.chip.hot{background:#ffe6ed;color:#b42345}.chip.soon{background:#fff5cf;color:#8c6812}.chip.gcal{background:#eee8ff;color:#5b42b1}.chip.done{background:#daf8e9;color:#157347}.task-actions{display:flex;gap:6px}.task-actions button{padding:8px 9px;border-radius:12px}.empty{padding:18px;border:1px dashed var(--line);border-radius:18px;text-align:center;color:var(--muted);background:#ffffff80}.focus-list .task{border-left:8px solid var(--pink)}
    .calendar-day{background:#fff;border:1px solid var(--line);border-radius:18px;padding:12px}.calendar-day h3{font-size:15px}.calendar-items{display:flex;flex-direction:column;gap:8px}.note{background:#fff;border:1px solid var(--line);border-radius:18px;padding:12px}.note h3{font-size:16px;margin-bottom:6px}.note p{white-space:pre-wrap;margin:0;color:var(--muted)}
    .toast{position:fixed;left:50%;bottom:22px;transform:translateX(-50%);background:#352432;color:#fff;border-radius:999px;padding:12px 18px;box-shadow:var(--shadow);z-index:20;max-width:92%;text-align:center}.modal{position:fixed;inset:0;background:#35243255;display:grid;place-items:center;z-index:30;padding:14px}.modal .card{max-width:720px;width:100%;max-height:90vh;overflow:auto}.switch{display:flex;align-items:center;gap:8px}.switch input{width:18px}.subtleBox{background:#fff7fb;border:1px solid var(--line);border-radius:18px;padding:12px}.progress{height:12px;background:#f4dceb;border-radius:999px;overflow:hidden}.bar{height:100%;background:linear-gradient(90deg,var(--rose),#9b6bff);width:0%}.small{font-size:12px;color:var(--muted)}
    @media(max-width:860px){.two,.three,.four,.wide,.side{grid-column:span 12}.fieldgrid{grid-template-columns:repeat(6,1fr)}.f12,.f6,.f4,.f3{grid-column:span 6}.top{align-items:flex-start}.statusbar{justify-content:flex-start}.task{grid-template-columns:auto 1fr}.task-actions{grid-column:2}.tabs{margin-left:-14px;margin-right:-14px;padding-left:14px;padding-right:14px}.app{padding-bottom:80px}}
  </style>
</head>
<body>
  <div class="app">
    <header class="top">
      <div class="brand"><div class="logo">🌷</div><div class="title"><h1>Мой нежный органайзер</h1><p>Дела, заметки, дедлайны и только важные события в календаре</p></div></div>
      <div class="statusbar"><span class="pill" id="netPill">● онлайн</span><span class="pill" id="syncPill">локально</span><span class="pill" id="gcalPill">Google не подключён</span></div>
    </header>

    <nav class="tabs" id="tabs"></nav>

    <main id="view"></main>
  </div>
  <div id="toast" class="toast hidden"></div>
  <div id="modal" class="modal hidden"></div>

<script>
const VERSION='v1.0-girl-organizer';
const STORAGE='girlOrganizerData_v1';
const tabs=[['today','Сегодня'],['tasks','Дела'],['notes','Заметки'],['calendar','Календарь'],['settings','Настройки']];
const cats=['Дом','Дети','AI / работа','Учёба','Здоровье','Покупки','Собака','Обсудить','Идеи','Личное'];
const defaultData={tasks:[],notes:[],settings:{github:{owner:'vasiekig-droid',repo:'personal-organizer',branch:'main',file:'organizer.json',token:''},google:{clientId:'',privacyDefault:'private',calendarId:'primary'},notifications:true},gcalEvents:[],lastSync:null,dirty:false};
let data=load(); let active='today'; let tokenClient=null; let googleToken=null; let notificationTimer=null;
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,8)}
function load(){try{return {...structuredClone(defaultData),...(JSON.parse(localStorage.getItem(STORAGE)||'{}'))}}catch(e){return structuredClone(defaultData)}}
function save(){data.dirty=true;localStorage.setItem(STORAGE,JSON.stringify(data));renderStatus();}
function hardSave(){localStorage.setItem(STORAGE,JSON.stringify(data));renderStatus();}
function toast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.remove('hidden');setTimeout(()=>el.classList.add('hidden'),2800)}
function fmtDate(d){return new Date(d+'T00:00:00').toLocaleDateString('ru-RU',{weekday:'short',day:'numeric',month:'short'})}
function todayISO(){return new Date().toISOString().slice(0,10)}
function nowMinutes(){const n=new Date(); return n.getHours()*60+n.getMinutes()}
function taskDateTime(t){if(!t.date)return null; return new Date(`${t.date}T${t.time||'23:59'}:00`)}
function isOverdue(t){const dt=taskDateTime(t);return !t.done&&dt&&dt<new Date()}
function isToday(t){return t.date===todayISO()}
function isSoon(t){const dt=taskDateTime(t);if(!dt||t.done)return false; return dt-new Date()<1000*60*60*24*2 && dt>=new Date()}
function remindMs(t){return Number(t.reminder||0)*60000}
function important(t){return t.importance==='Высокая' || t.focus || t.syncGcal!=='none'}
function renderStatus(){document.getElementById('netPill').textContent=navigator.onLine?'● онлайн':'● офлайн';document.getElementById('syncPill').textContent=data.dirty?'есть несинхр. изменения':'сохранено локально';document.getElementById('gcalPill').textContent=googleToken?'Google подключён':'Google не подключён'}
function nav(){document.getElementById('tabs').innerHTML=tabs.map(([id,name])=>`<button class="tab ${active===id?'active':''}" onclick="active='${id}';render()">${name}</button>`).join('')}
function render(){nav();renderStatus();const v=document.getElementById('view'); if(active==='today') v.innerHTML=viewToday(); if(active==='tasks') v.innerHTML=viewTasks(); if(active==='notes') v.innerHTML=viewNotes(); if(active==='calendar') v.innerHTML=viewCalendar(); if(active==='settings') v.innerHTML=viewSettings();}
function stats(){const open=data.tasks.filter(t=>!t.done), done=data.tasks.filter(t=>t.done);return{open,done,today:open.filter(isToday),over:open.filter(isOverdue),soon:open.filter(isSoon),focus:open.filter(t=>t.focus).slice(0,3)}}
function taskCard(t){const chips=[]; if(t.category)chips.push(`<span class="chip">${esc(t.category)}</span>`); if(t.date)chips.push(`<span class="chip ${isOverdue(t)?'hot':isSoon(t)?'soon':''}">${fmtDate(t.date)} ${t.time||''}</span>`); if(t.importance)chips.push(`<span class="chip">${esc(t.importance)}</span>`); if(t.syncGcal&&t.syncGcal!=='none')chips.push(`<span class="chip gcal">Google: ${t.googleEventId?'есть':'ожидает'}</span>`); if(t.done)chips.push(`<span class="chip done">сделано</span>`);
return `<div class="task ${t.done?'done':''}"><input type="checkbox" ${t.done?'checked':''} onchange="toggleTask('${t.id}')"><div><h3>${esc(t.title)}</h3>${t.desc?`<div class="soft">${esc(t.desc)}</div>`:''}<div class="meta">${chips.join('')}</div></div><div class="task-actions"><button onclick="editTask('${t.id}')">✏️</button><button class="danger" onclick="delTask('${t.id}')">🗑️</button></div></div>`}
function viewToday(){const s=stats(); const pct=data.tasks.length?Math.round(s.done.length/data.tasks.length*100):0;return `<div class="grid"><section class="card wide"><h2>🌸 Сегодня без перегруза</h2><div class="subtleBox"><b>Правило на день:</b> выбери максимум 3 главных дела. Остальное — бонус, не долг.</div><div class="stack" style="margin-top:12px">${s.focus.length?s.focus.map(taskCard).join(''):'<div class="empty">Нет выбранных главных дел. Отметь ⭐ в задаче или создай новое.</div>'}</div></section><section class="card side"><h2>Пульс дня</h2><div class="metric"><span>Открыто</span><b>${s.open.length}</b></div><div class="metric"><span>Сегодня</span><b>${s.today.length}</b></div><div class="metric"><span>Просрочено</span><b>${s.over.length}</b></div><div class="progress"><div class="bar" style="width:${pct}%"></div></div><div class="soft">Закрыто ${pct}% всех задач</div></section><section class="card two"><h2>🧠 Быстрая выгрузка головы</h2><textarea id="brain" placeholder="Пиши в столбик: купить…, записать…, спросить…, идея…"></textarea><div class="btns"><button class="primary" onclick="brainDump()">Разложить в задачи</button><button onclick="quickNote()">Сохранить как заметку</button></div></section><section class="card two"><h2>⏰ Ближайшее</h2><div class="stack">${nextTasks().slice(0,5).map(taskCard).join('')||'<div class="empty">Сейчас ничего не горит. Хороший знак.</div>'}</div></section><section class="card"><h2>📅 Google Calendar: занятость</h2><div class="btns"><button onclick="connectGoogle()">Подключить Google</button><button onclick="loadGoogleEvents()">Подтянуть 7 дней</button></div><div class="stack" style="margin-top:10px">${renderGcalEvents()}</div></section></div>`}
function nextTasks(){return data.tasks.filter(t=>!t.done&&t.date).sort((a,b)=>taskDateTime(a)-taskDateTime(b))}
function viewTasks(){return `<div class="grid"><section class="card"><h2>✅ Новая задача</h2>${taskForm()}</section><section class="card"><h2>Все дела</h2><div class="btns"><button onclick="setAllFilter('all')">Все</button><button onclick="setAllFilter('today')">Сегодня</button><button onclick="setAllFilter('over')">Просрочено</button><button onclick="setAllFilter('gcal')">Google</button></div><div class="stack" id="taskList" style="margin-top:12px">${filteredTasks().map(taskCard).join('')||'<div class="empty">Пока задач нет.</div>'}</div></section></div>`}
let allFilter='all'; function setAllFilter(f){allFilter=f;render()} function filteredTasks(){let arr=[...data.tasks]; if(allFilter==='today')arr=arr.filter(isToday); if(allFilter==='over')arr=arr.filter(isOverdue); if(allFilter==='gcal')arr=arr.filter(t=>t.syncGcal&&t.syncGcal!=='none'); return arr.sort((a,b)=>(a.done-b.done)||(taskDateTime(a)||Infinity)-(taskDateTime(b)||Infinity))}
function taskForm(t={}){return `<div class="fieldgrid"><div class="f6"><label>Название</label><input id="taskTitle" value="${esc(t.title||'')}" placeholder="Например: записать Никиту"></div><div class="f3"><label>Дата</label><input id="taskDate" type="date" value="${t.date||''}"></div><div class="f3"><label>Время</label><input id="taskTime" type="time" value="${t.time||''}"></div><div class="f12"><label>Описание / заметка</label><textarea id="taskDesc" placeholder="Детали только для тебя">${esc(t.desc||'')}</textarea></div><div class="f4"><label>Категория</label><select id="taskCat">${cats.map(c=>`<option ${t.category===c?'selected':''}>${c}</option>`).join('')}</select></div><div class="f4"><label>Важность</label><select id="taskImp"><option ${t.importance==='Обычная'?'selected':''}>Обычная</option><option ${t.importance==='Высокая'?'selected':''}>Высокая</option><option ${t.importance==='Низкая'?'selected':''}>Низкая</option></select></div><div class="f4"><label>Напомнить</label><select id="taskRem"><option value="0">не напоминать</option><option value="5" ${t.reminder==5?'selected':''}>за 5 минут</option><option value="15" ${t.reminder==15?'selected':''}>за 15 минут</option><option value="60" ${t.reminder==60?'selected':''}>за 1 час</option><option value="1440" ${t.reminder==1440?'selected':''}>за день</option></select></div><div class="f6"><label>Google Calendar</label><select id="taskGcal"><option value="none">не отправлять</option><option value="private" ${t.syncGcal==='private'?'selected':''}>отправить как “Личное дело”</option><option value="title" ${t.syncGcal==='title'?'selected':''}>отправить с названием</option></select><div class="small">В календарь уйдут только выбранные задачи с датой и временем.</div></div><div class="f6"><label>Фокус</label><div class="switch"><input type="checkbox" id="taskFocus" ${t.focus?'checked':''}> <span>показать в 3 главных делах</span></div></div><div class="f12 btns"><button class="primary" onclick="saveTask('${t.id||''}')">${t.id?'Сохранить':'Добавить задачу'}</button><button onclick="syncSelectedToGoogle()">Отправить важное в Google</button></div></div>`}
function readTaskForm(id){return{id:id||uid(),title:val('taskTitle').trim(),date:val('taskDate'),time:val('taskTime'),desc:val('taskDesc').trim(),category:val('taskCat'),importance:val('taskImp'),reminder:Number(val('taskRem')),syncGcal:val('taskGcal'),focus:document.getElementById('taskFocus').checked,done:false,createdAt:new Date().toISOString(),googleEventId:id?(data.tasks.find(x=>x.id===id)||{}).googleEventId:null}}
function val(id){return document.getElementById(id).value}
function saveTask(id){const t=readTaskForm(id); if(!t.title)return toast('Нужно название задачи'); if(t.syncGcal!=='none'&&(!t.date||!t.time))return toast('Для Google Calendar нужна дата и время'); if(id){const old=data.tasks.findIndex(x=>x.id===id); t.done=data.tasks[old].done; data.tasks[old]=t}else data.tasks.unshift(t); save(); closeModal(); render(); if(t.syncGcal!=='none')toast('Задача сохранена. В Google отправится только по кнопке синхронизации.')}
function editTask(id){const t=data.tasks.find(x=>x.id===id); openModal(`<h2>Редактировать задачу</h2>${taskForm(t)}`)}
function toggleTask(id){const t=data.tasks.find(x=>x.id===id); t.done=!t.done; save(); render()} function delTask(id){if(confirm('Удалить задачу?')){data.tasks=data.tasks.filter(t=>t.id!==id);save();render()}}
function brainDump(){const lines=val('brain').split('\n').map(x=>x.trim()).filter(Boolean); lines.forEach(x=>data.tasks.unshift({id:uid(),title:x,desc:'',category:'Личное',importance:'Обычная',reminder:0,syncGcal:'none',focus:false,done:false,createdAt:new Date().toISOString()})); save();render();toast(`Добавлено задач: ${lines.length}`)}
function quickNote(){const txt=val('brain').trim(); if(!txt)return; data.notes.unshift({id:uid(),title:'Быстрая заметка',text:txt,createdAt:new Date().toISOString()}); save();render();toast('Заметка сохранена')}
function viewNotes(){return `<div class="grid"><section class="card two"><h2>📝 Новая заметка</h2><label>Заголовок</label><input id="noteTitle" placeholder="Например: идеи для портфолио"><label>Текст</label><textarea id="noteText" placeholder="Можно писать свободно"></textarea><div class="btns"><button class="primary" onclick="addNote()">Сохранить</button></div></section><section class="card two"><h2>Заметки</h2><div class="stack">${data.notes.map(n=>`<div class="note"><h3>${esc(n.title)}</h3><p>${esc(n.text)}</p><div class="btns" style="margin-top:8px"><button onclick="noteToTask('${n.id}')">Сделать задачей</button><button class="danger" onclick="delNote('${n.id}')">Удалить</button></div></div>`).join('')||'<div class="empty">Пока заметок нет.</div>'}</div></section></div>`}
function addNote(){const title=val('noteTitle').trim()||'Заметка'; const text=val('noteText').trim(); if(!text)return toast('Пустую заметку не сохраняю'); data.notes.unshift({id:uid(),title,text,createdAt:new Date().toISOString()}); save();render()} function delNote(id){data.notes=data.notes.filter(n=>n.id!==id);save();render()} function noteToTask(id){const n=data.notes.find(x=>x.id===id); data.tasks.unshift({id:uid(),title:n.title,desc:n.text,category:'Идеи',importance:'Обычная',reminder:0,syncGcal:'none',focus:false,done:false,createdAt:new Date().toISOString()}); save();render();toast('Заметка превращена в задачу')}
function viewCalendar(){const days=[...Array(14)].map((_,i)=>{const d=new Date();d.setDate(d.getDate()+i);return d.toISOString().slice(0,10)});return `<div class="grid"><section class="card"><h2>📅 Ближайшие 14 дней</h2><div class="grid">${days.map(d=>`<div class="calendar-day three"><h3>${fmtDate(d)}</h3><div class="calendar-items">${data.tasks.filter(t=>t.date===d).map(t=>`<span class="chip ${isOverdue(t)?'hot':''}">${t.time||'без времени'} · ${esc(t.title)}</span>`).join('')||'<span class="small">пусто</span>'}</div></div>`).join('')}</div></section><section class="card"><h2>Google занятость</h2><div class="btns"><button onclick="connectGoogle()">Подключить</button><button onclick="loadGoogleEvents()">Обновить</button></div><div class="stack" style="margin-top:10px">${renderGcalEvents()}</div></section></div>`}
function renderGcalEvents(){if(!data.gcalEvents?.length)return '<div class="empty">События из Google пока не загружены. Можно показывать только занятость, не превращая её в задачи.</div>'; return data.gcalEvents.slice(0,12).map(e=>`<div class="subtleBox"><b>${esc(e.summary||'Занято')}</b><div class="soft">${new Date(e.start).toLocaleString('ru-RU')} — ${e.end?new Date(e.end).toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit'}):''}</div></div>`).join('')}
function viewSettings(){const g=data.settings.github, gg=data.settings.google;return `<div class="grid"><section class="card two"><h2>🔄 GitHub Sync</h2><div class="fieldgrid"><div class="f6"><label>Owner</label><input id="ghOwner" value="${esc(g.owner)}"></div><div class="f6"><label>Repo</label><input id="ghRepo" value="${esc(g.repo)}"></div><div class="f4"><label>Branch</label><input id="ghBranch" value="${esc(g.branch)}"></div><div class="f4"><label>Файл</label><input id="ghFile" value="${esc(g.file)}"></div><div class="f12"><label>GitHub token</label><input id="ghToken" type="password" value="${esc(g.token)}" placeholder="токен хранится только в браузере"></div></div><div class="btns"><button onclick="saveSettings()">Сохранить настройки</button><button class="good" onclick="pullGithub()">Из облака</button><button class="primary" onclick="pushGithub()">В облако</button></div><p class="soft">Защита: пустые данные не отправляются в облако.</p></section><section class="card two"><h2>📅 Google Calendar</h2><label>OAuth Client ID</label><input id="googleClient" value="${esc(gg.clientId)}" placeholder="...apps.googleusercontent.com"><label>Calendar ID</label><input id="googleCal" value="${esc(gg.calendarId||'primary')}"><label>По умолчанию отправлять</label><select id="googlePrivacy"><option value="private" ${gg.privacyDefault==='private'?'selected':''}>как “Личное дело”</option><option value="title" ${gg.privacyDefault==='title'?'selected':''}>с названием задачи</option></select><div class="btns"><button onclick="saveSettings()">Сохранить</button><button class="primary" onclick="connectGoogle()">Подключить Google</button><button onclick="syncSelectedToGoogle()">Синхронизировать важное</button></div><p class="soft">В Google уходят только задачи, где выбран Google Calendar, и только дата/время + безопасное название.</p></section><section class="card"><h2>🔔 Уведомления</h2><div class="btns"><button onclick="requestNotifications()">Разрешить уведомления</button><button onclick="testNotification()">Тест</button></div><p class="soft">Локальные уведомления надёжнее, когда приложение открыто или недавно запускалось. Для важных дел лучше использовать Google Calendar.</p></section><section class="card"><h2>💾 Данные</h2><div class="btns"><button onclick="exportData()">Скачать JSON</button><button class="danger" onclick="resetApp()">Сбросить локально</button></div></section></div>`}
function saveSettings(){data.settings.github={owner:val('ghOwner')||'',repo:val('ghRepo')||'',branch:val('ghBranch')||'main',file:val('ghFile')||'organizer.json',token:val('ghToken')||''};data.settings.google={clientId:val('googleClient')||'',calendarId:val('googleCal')||'primary',privacyDefault:val('googlePrivacy')||'private'};save();toast('Настройки сохранены')}
async function githubReq(method,path,body){const g=data.settings.github; const url=`https://api.github.com/repos/${g.owner}/${g.repo}/contents/${g.file}${method==='GET'?`?ref=${g.branch}`:''}`; const res=await fetch(url,{method,headers:{Authorization:`Bearer ${g.token}`,Accept:'application/vnd.github+json'},body:body?JSON.stringify(body):undefined}); if(!res.ok)throw new Error(await res.text()); return res.json()}
async function pullGithub(){try{saveSettings();const r=await githubReq('GET'); const json=JSON.parse(decodeURIComponent(escape(atob(r.content.replace(/\n/g,''))))); data={...structuredClone(defaultData),...json, settings:{...data.settings,...json.settings, github:data.settings.github}}; data.dirty=false; hardSave(); render();toast('Данные загружены из GitHub')}catch(e){toast('Не получилось загрузить из GitHub. Проверь repo/token.')}}
async function pushGithub(){try{saveSettings(); if(!data.tasks.length&&!data.notes.length)return toast('Пустые данные не отправляю в облако'); let sha=null; try{const old=await githubReq('GET'); sha=old.sha}catch(e){} const payload={...data,dirty:false,lastSync:new Date().toISOString()}; const content=btoa(unescape(encodeURIComponent(JSON.stringify(payload,null,2)))); await githubReq('PUT','',{message:`Update organizer ${new Date().toISOString()}`,content,branch:data.settings.github.branch,sha}); data.dirty=false; data.lastSync=new Date().toISOString(); hardSave();render();toast('Данные отправлены в GitHub')}catch(e){toast('Не получилось отправить в GitHub')}}
function connectGoogle(){saveSettings(); const clientId=data.settings.google.clientId; if(!clientId)return toast('Сначала вставь Google OAuth Client ID в настройках'); if(!window.google?.accounts?.oauth2)return toast('Google скрипт ещё не загрузился или нет интернета'); tokenClient=google.accounts.oauth2.initTokenClient({client_id:clientId,scope:'https://www.googleapis.com/auth/calendar.events https://www.googleapis.com/auth/calendar.readonly',callback:(resp)=>{if(resp.error){toast('Google вход не удался');return} googleToken=resp.access_token; renderStatus(); toast('Google подключён')}}); tokenClient.requestAccessToken({prompt:'consent'});}
async function gFetch(url,opts={}){if(!googleToken){connectGoogle(); throw new Error('no token')} const res=await fetch(url,{...opts,headers:{Authorization:`Bearer ${googleToken}`,'Content-Type':'application/json',...(opts.headers||{})}}); if(!res.ok)throw new Error(await res.text()); return res.json()}
async function loadGoogleEvents(){try{if(!googleToken){connectGoogle();return} const now=new Date(), max=new Date(); max.setDate(max.getDate()+7); const cal=encodeURIComponent(data.settings.google.calendarId||'primary'); const url=`https://www.googleapis.com/calendar/v3/calendars/${cal}/events?timeMin=${now.toISOString()}&timeMax=${max.toISOString()}&singleEvents=true&orderBy=startTime`; const r=await gFetch(url); data.gcalEvents=(r.items||[]).map(e=>({id:e.id,summary:e.summary,start:e.start.dateTime||e.start.date,end:e.end?.dateTime||e.end?.date})); hardSave(); render(); toast('Занятость из Google обновлена')}catch(e){toast('Не удалось прочитать Google Calendar')}}
async function syncSelectedToGoogle(){try{if(!googleToken){connectGoogle();return} const list=data.tasks.filter(t=>!t.done&&t.syncGcal&&t.syncGcal!=='none'&&t.date&&t.time); if(!list.length)return toast('Нет выбранных задач с датой и временем'); for(const t of list){await upsertGcal(t)} save(); render(); toast(`В Google синхронизировано: ${list.length}`)}catch(e){toast('Google синхронизация не удалась')}}
async function upsertGcal(t){const start=new Date(`${t.date}T${t.time}:00`); const end=new Date(start.getTime()+30*60000); const summary=t.syncGcal==='title'?t.title:'Личное дело'; const event={summary,description:t.syncGcal==='title'?`Создано из органайзера. Категория: ${t.category}`:'Создано из личного органайзера. Детали остаются внутри приложения.',start:{dateTime:start.toISOString()},end:{dateTime:end.toISOString()},reminders:t.reminder?{useDefault:false,overrides:[{method:'popup',minutes:Number(t.reminder)}]}:{useDefault:true}}; const cal=encodeURIComponent(data.settings.google.calendarId||'primary'); if(t.googleEventId){await gFetch(`https://www.googleapis.com/calendar/v3/calendars/${cal}/events/${t.googleEventId}`,{method:'PUT',body:JSON.stringify(event)})}else{const r=await gFetch(`https://www.googleapis.com/calendar/v3/calendars/${cal}/events`,{method:'POST',body:JSON.stringify(event)}); t.googleEventId=r.id}}
function requestNotifications(){if(!('Notification'in window))return toast('Браузер не поддерживает уведомления'); Notification.requestPermission().then(p=>toast(p==='granted'?'Уведомления разрешены':'Уведомления не разрешены'))} function testNotification(){if(Notification.permission==='granted')new Notification('Мой органайзер',{body:'Тестовое напоминание работает 🌷'});else requestNotifications()}
function startReminderLoop(){clearInterval(notificationTimer); notificationTimer=setInterval(()=>{if(Notification.permission!=='granted')return; const now=new Date(); data.tasks.forEach(t=>{if(t.done||!t.date||!t.time||!t.reminder)return; const fire=new Date(taskDateTime(t).getTime()-remindMs(t)); const key='notified_'+t.id+'_'+t.date+t.time+t.reminder; if(Math.abs(now-fire)<30000&&!localStorage.getItem(key)){new Notification(t.title,{body:`Напоминание: ${fmtDate(t.date)} ${t.time}`});localStorage.setItem(key,'1')}})},30000)}
function exportData(){const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([JSON.stringify(data,null,2)],{type:'application/json'}));a.download='organizer-backup.json';a.click()} function resetApp(){if(confirm('Стереть локальные данные? GitHub не трогаю.')){localStorage.removeItem(STORAGE);location.reload()}}
function openModal(html){document.getElementById('modal').innerHTML=`<div class="card"><div class="btns" style="justify-content:flex-end"><button onclick="closeModal()">Закрыть</button></div>${html}</div>`;document.getElementById('modal').classList.remove('hidden')} function closeModal(){document.getElementById('modal').classList.add('hidden')}
function esc(s){return String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
window.addEventListener('online',renderStatus);window.addEventListener('offline',renderStatus); if('serviceWorker'in navigator) navigator.serviceWorker.register('sw.js'); startReminderLoop(); render();
</script>
