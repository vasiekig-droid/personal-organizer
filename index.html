<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#f7d7e8" />
  <title>Мой нежный органайзер v1.5</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="icon.svg" type="image/svg+xml" />
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <style>
    :root{
      --bg:#fff7fb; --panel:#ffffffcc; --panel-solid:#fff; --ink:#352432; --muted:#7b6475;
      --line:#f2d7e7; --pink:#f5a7cc; --pink2:#ffd8ea; --rose:#d94f8f; --lav:#d8ccff;
      --mint:#c8f3e0; --yellow:#fff0b8; --red:#ff5d7a; --green:#31a36b; --shadow:0 18px 50px #c85a9b22;
      --radius:24px;
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;color:var(--ink);background:
      radial-gradient(circle at 15% 5%, #ffd3eb 0 18%, transparent 35%),
      radial-gradient(circle at 90% 10%, #e8ddff 0 16%, transparent 38%),
      linear-gradient(135deg,#fff7fb,#fffdf8 55%,#f9f3ff);min-height:100vh;}
    .app{max-width:1180px;margin:0 auto;padding:18px 14px 96px}.top{display:flex;gap:14px;align-items:center;justify-content:space-between;margin-bottom:14px}.brand{display:flex;gap:12px;align-items:center}.logo{width:54px;height:54px;border-radius:18px;background:linear-gradient(145deg,#ffb8d8,#d8ccff);display:grid;place-items:center;box-shadow:var(--shadow);font-size:28px}.title h1{margin:0;font-size:clamp(22px,3vw,34px);line-height:1}.title p{margin:5px 0 0;color:var(--muted);font-size:14px}.statusbar{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}.pill{border:1px solid var(--line);background:#ffffffaa;border-radius:999px;padding:8px 12px;color:var(--muted);font-size:13px;backdrop-filter:blur(12px)}
    .tabs{position:sticky;top:0;z-index:5;display:flex;gap:8px;overflow:auto;padding:10px 0;margin-bottom:14px;background:linear-gradient(#fff7fbdd,#fff7fb88);backdrop-filter:blur(16px)}.tab{border:1px solid var(--line);background:#fff;border-radius:999px;padding:10px 14px;color:var(--muted);cursor:pointer;white-space:nowrap;font-weight:700}.tab.active{background:linear-gradient(135deg,var(--rose),#9b6bff);color:#fff;border-color:transparent;box-shadow:0 12px 26px #d94f8f30}
    .grid{display:grid;grid-template-columns:repeat(12,1fr);gap:14px}.card{grid-column:span 12;background:var(--panel);border:1px solid #ffffff80;border-radius:var(--radius);box-shadow:var(--shadow);padding:16px;backdrop-filter:blur(18px)}.card h2,.card h3{margin:0 0 12px}.two{grid-column:span 6}.three{grid-column:span 4}.four{grid-column:span 3}.wide{grid-column:span 8}.side{grid-column:span 4}
    .metric{display:flex;align-items:center;justify-content:space-between;gap:12px}.metric b{font-size:32px}.soft{color:var(--muted);font-size:13px}.row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}.stack{display:flex;flex-direction:column;gap:10px}.hidden{display:none!important}
    input,textarea,select{width:100%;border:1px solid var(--line);background:#fff;border-radius:16px;padding:12px 13px;font:inherit;color:var(--ink);outline:none}textarea{min-height:84px;resize:vertical}label{font-size:13px;color:var(--muted);font-weight:700;display:block;margin:0 0 5px}.fieldgrid{display:grid;grid-template-columns:repeat(12,1fr);gap:10px}.f12{grid-column:span 12}.f6{grid-column:span 6}.f4{grid-column:span 4}.f3{grid-column:span 3}
    button{border:0;border-radius:16px;padding:11px 14px;font-weight:800;cursor:pointer;color:var(--ink);background:#fff;border:1px solid var(--line)}button.primary{background:linear-gradient(135deg,var(--rose),#9b6bff);color:#fff;border:0}button.good{background:linear-gradient(135deg,#bdf1d9,#fff0b8);border:0}button.danger{background:#ffe7ed;color:#b42345;border-color:#ffc5d1}button.ghost{background:#ffffff90}.btns{display:flex;gap:8px;flex-wrap:wrap}
    .task{background:#fff;border:1px solid var(--line);border-radius:20px;padding:13px;display:grid;grid-template-columns:auto 1fr auto;gap:10px;align-items:start}.task.done{opacity:.62}.task input[type=checkbox]{width:22px;height:22px;margin-top:2px}.task h3{margin:0;font-size:16px}.task .meta{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}.chip{font-size:12px;border-radius:999px;padding:5px 8px;background:#fff3f8;border:1px solid var(--line);color:var(--muted)}.chip.hot{background:#ffe6ed;color:#b42345}.chip.soon{background:#fff5cf;color:#8c6812}.chip.gcal{background:#eee8ff;color:#5b42b1}.chip.done{background:#daf8e9;color:#157347}.task-actions{display:flex;gap:6px}.task-actions button{padding:8px 9px;border-radius:12px}.empty{padding:18px;border:1px dashed var(--line);border-radius:18px;text-align:center;color:var(--muted);background:#ffffff80}.focus-list .task{border-left:8px solid var(--pink)}
    .calendar-day{background:#fff;border:1px solid var(--line);border-radius:18px;padding:12px}.calendar-day h3{font-size:15px}.calendar-items{display:flex;flex-direction:column;gap:8px}.note{background:#fff;border:1px solid var(--line);border-radius:18px;padding:12px}.note h3{font-size:16px;margin-bottom:6px}.note p{white-space:pre-wrap;margin:0;color:var(--muted)}
    .toast{position:fixed;left:50%;bottom:22px;transform:translateX(-50%);background:#352432;color:#fff;border-radius:999px;padding:12px 18px;box-shadow:var(--shadow);z-index:20;max-width:92%;text-align:center}.modal{position:fixed;inset:0;background:#35243255;display:grid;place-items:center;z-index:30;padding:14px}.modal .card{max-width:720px;width:100%;max-height:90vh;overflow:auto}.switch{display:flex;align-items:center;gap:8px}.switch input{width:18px}.subtleBox{background:#fff7fb;border:1px solid var(--line);border-radius:18px;padding:12px}.progress{height:12px;background:#f4dceb;border-radius:999px;overflow:hidden}.bar{height:100%;background:linear-gradient(90deg,var(--rose),#9b6bff);width:0%}.small{font-size:12px;color:var(--muted)}
    .quickInput{min-height:74px;font-size:18px;line-height:1.35;border:2px solid #f2c5df;background:#fffdfdcc}.quickInput:focus{border-color:var(--rose);box-shadow:0 0 0 4px #f5a7cc22}.quickPreview{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}.quickHint{background:linear-gradient(135deg,#fff,#fff0f7);border:1px solid var(--line);border-radius:16px;padding:10px;color:var(--muted);font-size:13px}.quickButtons button{padding:9px 11px;border-radius:999px}
    @media(max-width:860px){.two,.three,.four,.wide,.side{grid-column:span 12}.fieldgrid{grid-template-columns:repeat(6,1fr)}.f12,.f6,.f4,.f3{grid-column:span 6}.top{align-items:flex-start}.statusbar{justify-content:flex-start}.task{grid-template-columns:auto 1fr}.task-actions{grid-column:2}.tabs{margin-left:-14px;margin-right:-14px;padding-left:14px;padding-right:14px}.app{padding-bottom:80px}}
  </style>
</head>
<body>
  <div class="app">
    <header class="top">
      <div class="brand"><div class="logo">🌷</div><div class="title"><h1>Мой нежный органайзер</h1><p>Дела, красота и финансы по сферам — без перегруза</p></div></div>
      <div class="statusbar"><span class="pill" id="netPill">● онлайн</span><span class="pill" id="syncPill">локально</span><span class="pill" id="gcalPill">Google не подключён</span></div>
    </header>

    <nav class="tabs" id="tabs"></nav>

    <main id="view"></main>
  </div>
  <div id="toast" class="toast hidden"></div>
  <div id="modal" class="modal hidden"></div>

<script>
const VERSION='v1.4-girl-organizer-finance-beauty';
const STORAGE='girlOrganizerData_v1';
const tabs=[['today','Сегодня'],['areas','Сферы'],['tasks','Дела'],['finance','Финансы'],['notes','Заметки'],['calendar','Календарь'],['settings','Настройки']];
const cats=['Психолог','Продукты','Учёба','Дом','Семья','Здоровье','Красота','Поездки','Отдых','Дети','AI / работа','Покупки','Собака','Обсудить','Идеи','Личное'];
const areaInfo={
  'Психолог':{emoji:'🧩',hint:'мысли, вопросы, наблюдения, темы к сессии',privacy:'private'},
  'Продукты':{emoji:'🛒',hint:'покупки, меню, что докупить, список на магазин',privacy:'none'},
  'Учёба':{emoji:'📚',hint:'курсы, сербский, английский, уроки, домашки, практика',privacy:'title'},
  'Дом':{emoji:'🏠',hint:'быт, уборка, готовка, документы, мелкие дела',privacy:'none'},
  'Семья':{emoji:'👨‍👩‍👦',hint:'Леонид, Лёня, муж, любимый, дети, общие планы',privacy:'private'},
  'Здоровье':{emoji:'💊',hint:'врачи, лекарства, анализы, самочувствие, процедуры',privacy:'private'},
  'Красота':{emoji:'💅',hint:'маникюр, волосы, уход, косметика, процедуры, одежда',privacy:'private'},
  'Поездки':{emoji:'✈️',hint:'поездки, путешествия, дорога, билеты, сборы',privacy:'title'},
  'Отдых':{emoji:'🛋️',hint:'восстановление, прогулки, кино, свободное время',privacy:'none'}
};
const defaultData={tasks:[],notes:[],finance:{budgets:[],expenses:[],goals:[]},settings:{github:{owner:'vasiekig-droid',repo:'personal-organizer',branch:'main',file:'organizer.json',token:''},google:{clientId:'',privacyDefault:'private',calendarId:'primary'},notifications:true},gcalEvents:[],lastSync:null,dirty:false};
let data=load(); let active='today'; let tokenClient=null; let googleToken=null; let notificationTimer=null;
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,8)}
function load(){try{return {...structuredClone(defaultData),...(JSON.parse(localStorage.getItem(STORAGE)||'{}'))}}catch(e){return structuredClone(defaultData)}}
function save(){data.dirty=true;localStorage.setItem(STORAGE,JSON.stringify(data));renderStatus();}
function hardSave(){localStorage.setItem(STORAGE,JSON.stringify(data));renderStatus();}
function migrateLegacyData(){let changed=false;(data.tasks||[]).forEach(t=>{if(t.category==='Курс'){t.category='Учёба';changed=true}}); if(changed)hardSave();}
migrateLegacyData();
function toast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.remove('hidden');setTimeout(()=>el.classList.add('hidden'),2800)}
function fmtDate(d){return new Date(d+'T00:00:00').toLocaleDateString('ru-RU',{weekday:'short',day:'numeric',month:'short'})}
function todayISO(){return new Date().toISOString().slice(0,10)}
function nowMinutes(){const n=new Date(); return n.getHours()*60+n.getMinutes()}
function taskDateTime(t){if(!t.date)return null; return new Date(`${t.date}T${t.time||'23:59'}:00`)}
function isOverdue(t){const dt=taskDateTime(t);return !t.done&&dt&&dt<new Date()}
function isToday(t){return t.date===todayISO()}
function isSoon(t){const dt=taskDateTime(t);if(!dt||t.done)return false; return dt-new Date()<1000*60*60*24*2 && dt>=new Date()}
function remindMs(t){return Number(t.reminder||0)*60000}
function important(t){return t.importance==='Высокая' || t.focus || t.syncGcal!=='none'}
function renderStatus(){document.getElementById('netPill').textContent=navigator.onLine?'● онлайн':'● офлайн';document.getElementById('syncPill').textContent=data.dirty?'есть несинхр. изменения':'сохранено локально';document.getElementById('gcalPill').textContent=googleToken?'Google подключён':'Google не подключён'}
function nav(){document.getElementById('tabs').innerHTML=tabs.map(([id,name])=>`<button class="tab ${active===id?'active':''}" onclick="active='${id}';render()">${name}</button>`).join('')}
function render(){nav();renderStatus();const v=document.getElementById('view'); if(active==='today') v.innerHTML=viewToday(); if(active==='areas') v.innerHTML=viewAreas(); if(active==='tasks') v.innerHTML=viewTasks(); if(active==='finance') v.innerHTML=viewFinance(); if(active==='notes') v.innerHTML=viewNotes(); if(active==='calendar') v.innerHTML=viewCalendar(); if(active==='settings') v.innerHTML=viewSettings();}
function stats(){const open=data.tasks.filter(t=>!t.done), done=data.tasks.filter(t=>t.done);return{open,done,today:open.filter(isToday),over:open.filter(isOverdue),soon:open.filter(isSoon),focus:open.filter(t=>t.focus).slice(0,3)}}
function taskCard(t){const chips=[]; if(t.category)chips.push(`<span class="chip">${esc(t.category)}</span>`); if(t.date)chips.push(`<span class="chip ${isOverdue(t)?'hot':isSoon(t)?'soon':''}">${fmtDate(t.date)} ${t.time||''}</span>`); if(t.importance)chips.push(`<span class="chip">${esc(t.importance)}</span>`); if(t.syncGcal&&t.syncGcal!=='none')chips.push(`<span class="chip gcal">Google: ${t.googleEventId?'есть':'ожидает'}</span>`); if(t.done)chips.push(`<span class="chip done">сделано</span>`);
return `<div class="task ${t.done?'done':''}"><input type="checkbox" ${t.done?'checked':''} onchange="toggleTask('${t.id}')"><div><h3>${esc(t.title)}</h3>${t.desc?`<div class="soft">${esc(t.desc)}</div>`:''}<div class="meta">${chips.join('')}</div></div><div class="task-actions"><button onclick="editTask('${t.id}')">✏️</button><button class="danger" onclick="delTask('${t.id}')">🗑️</button></div></div>`}
function quickAddBlock(){return `<section class="card"><h2>⚡ Быстро добавить дело</h2><div class="quickHint"><b>Пиши как говоришь:</b> “купить молоко”, “для психолога обсудить тревогу”, “по учёбе английский завтра 18:00”, “для семьи Лёня”, “красота маникюр”, “поездка в Белград”. Приложение само выберет сферу по опорным словам.</div><textarea id="quickInput" class="quickInput" placeholder="Например: купить хлеб, яйца и молоко" oninput="quickPreview()" onkeydown="quickKey(event)"></textarea><div id="quickPreview" class="quickPreview"><span class="chip">Сфера определится автоматически</span></div><div class="btns quickButtons" style="margin-top:10px"><button onclick="quickPrefix('купить ')">🛒 Купить</button><button onclick="quickPrefix('для психолога ')">🧩 Психолог</button><button onclick="quickPrefix('по учёбе ')">📚 Учёба</button><button onclick="quickPrefix('для дома ')">🏠 Дом</button><button onclick="quickPrefix('для семьи ')">👨‍👩‍👦 Семья</button><button onclick="quickPrefix('для работы ')">👩‍💻 Работа</button><button onclick="quickPrefix('по здоровью ')">💊 Здоровье</button><button onclick="quickPrefix('красота ')">💅 Красота</button><button onclick="quickPrefix('поездка ')">✈️ Поездки</button><button onclick="quickPrefix('отдых ')">🛋️ Отдых</button></div><div class="btns" style="margin-top:10px"><button class="primary" onclick="quickSmartAdd(false)">Добавить</button><button class="good" onclick="quickSmartAdd(true)">Добавить в 3 главных</button><button onclick="clearQuickInput()">Очистить</button></div><div class="small">Enter переносит строку, Ctrl+Enter добавляет. Можно писать несколько дел в столбик.</div></section>`}
function viewToday(){const s=stats(); const pct=data.tasks.length?Math.round(s.done.length/data.tasks.length*100):0;return `<div class="grid">${quickAddBlock()}<section class="card wide"><h2>🌸 Сегодня без перегруза</h2><div class="subtleBox"><b>Правило на день:</b> максимум 3 главных дела. Остальное — бонус, не долг.</div><div class="stack" style="margin-top:12px">${s.focus.length?s.focus.map(taskCard).join(''):'<div class="empty">Нет выбранных главных дел. Отметь ⭐ в задаче или добавь через быстрый ввод выше.</div>'}</div></section><section class="card side"><h2>Пульс дня</h2><div class="metric"><span>Открыто</span><b>${s.open.length}</b></div><div class="metric"><span>Сегодня</span><b>${s.today.length}</b></div><div class="metric"><span>Просрочено</span><b>${s.over.length}</b></div><div class="progress"><div class="bar" style="width:${pct}%"></div></div><div class="soft">Закрыто ${pct}% всех задач</div></section><section class="card"><h2>🧭 Сферы без хаоса</h2><div class="grid">${areaMiniCards()}</div></section><section class="card two"><h2>🧠 Выгрузка в выбранную сферу</h2><label>Куда положить</label><select id="brainCat">${cats.map(c=>`<option>${c}</option>`).join('')}</select><textarea id="brain" placeholder="Если хочешь вручную выбрать сферу — пиши сюда в столбик"></textarea><div class="btns"><button class="primary" onclick="brainDump()">Разложить в задачи</button><button onclick="quickNote()">Сохранить как заметку</button></div></section><section class="card two"><h2>💰 Финансы месяца</h2><div class="stack">${financeMonthMini()}</div><div class="btns" style="margin-top:10px"><button onclick="active='finance';render()">Открыть финансы</button></div></section><section class="card two"><h2>⏰ Ближайшее</h2><div class="stack">${nextTasks().slice(0,5).map(taskCard).join('')||'<div class="empty">Сейчас ничего не горит. Хороший знак.</div>'}</div></section><section class="card"><h2>📅 Google Calendar: занятость</h2><div class="btns"><button onclick="connectGoogle()">Подключить Google</button><button onclick="loadGoogleEvents()">Подтянуть 7 дней</button></div><div class="stack" style="margin-top:10px">${renderGcalEvents()}</div></section></div>`}

function catStats(cat){const arr=data.tasks.filter(t=>t.category===cat); const open=arr.filter(t=>!t.done); return {all:arr,open,over:open.filter(isOverdue),today:open.filter(isToday)} }
function areaMiniCards(){return Object.keys(areaInfo).map(cat=>{const st=catStats(cat), info=areaInfo[cat]; return `<div class="card three" style="box-shadow:none;background:#fff"><h3>${info.emoji} ${cat}</h3><div class="soft">${info.hint}</div><div class="metric"><span>Открыто</span><b>${st.open.length}</b></div><div class="btns"><button onclick="active='tasks';allFilter='cat:${cat}';render()">Открыть</button><button onclick="quickAreaTask('${cat}')">+ дело</button></div></div>`}).join('')}
function viewAreas(){return `<div class="grid"><section class="card"><h2>🧭 Сферы жизни</h2><div class="subtleBox"><b>Зачем это:</b> когда мыслей много, не надо держать всё в одной куче. Каждая задача сразу попадает в понятную коробочку.</div><div class="grid" style="margin-top:12px">${areaMiniCards()}</div></section><section class="card"><h2>Быстрые заготовки</h2><div class="btns"><button onclick="templateTask('Психолог','Вопросы к психологу','Что хочу обсудить на сессии:\n— ')">🧩 Вопросы к психологу</button><button onclick="templateTask('Продукты','Список продуктов','Что купить:\n— ')">🛒 Список продуктов</button><button onclick="templateTask('Учёба','Задача по учёбе','Что сделать по учёбе:')">📚 Учёба</button><button onclick="templateTask('Здоровье','Задача по здоровью','Что важно не забыть:')">💊 Здоровье</button><button onclick="templateTask('Красота','Задача по красоте','Что записать / купить / запланировать:')">💅 Красота</button><button onclick="templateTask('Поездки','План поездки','Куда / когда / что взять:')">✈️ Поездки</button><button onclick="templateTask('Отдых','План отдыха','Что поможет восстановиться:')">🛋️ Отдых</button><button onclick="templateTask('Дом','Домашнее дело','Что сделать дома:')">🏠 Дом</button><button onclick="templateTask('Семья','Семейное дело','Кого/что касается:')">👨‍👩‍👦 Семья</button></div></section></div>`}
function quickAreaTask(cat){active='tasks'; render(); setTimeout(()=>{document.getElementById('taskCat').value=cat; document.getElementById('taskTitle').focus();},50)}
function templateTask(cat,title,desc){active='tasks'; render(); setTimeout(()=>{document.getElementById('taskCat').value=cat; document.getElementById('taskTitle').value=title; document.getElementById('taskDesc').value=desc; document.getElementById('taskGcal').value=areaInfo[cat]?.privacy||'none';},50)}

function nextTasks(){return data.tasks.filter(t=>!t.done&&t.date).sort((a,b)=>taskDateTime(a)-taskDateTime(b))}
function viewTasks(){return `<div class="grid"><section class="card"><h2>✅ Новая задача</h2>${taskForm()}</section><section class="card"><h2>Все дела</h2><div class="btns"><button onclick="setAllFilter('all')">Все</button><button onclick="setAllFilter('today')">Сегодня</button><button onclick="setAllFilter('over')">Просрочено</button><button onclick="setAllFilter('gcal')">Google</button>${cats.map(c=>`<button onclick="setAllFilter('cat:${c}')">${c}</button>`).join('')}</div><div class="stack" id="taskList" style="margin-top:12px">${filteredTasks().map(taskCard).join('')||'<div class="empty">Пока задач нет.</div>'}</div></section></div>`}
let allFilter='all'; function setAllFilter(f){allFilter=f;render()} function filteredTasks(){let arr=[...data.tasks]; if(allFilter==='today')arr=arr.filter(isToday); if(allFilter==='over')arr=arr.filter(isOverdue); if(allFilter==='gcal')arr=arr.filter(t=>t.syncGcal&&t.syncGcal!=='none'); if(allFilter.startsWith('cat:'))arr=arr.filter(t=>t.category===allFilter.slice(4)); return arr.sort((a,b)=>(a.done-b.done)||(taskDateTime(a)||Infinity)-(taskDateTime(b)||Infinity))}
function taskForm(t={},prefix='task'){return `<div class="fieldgrid"><div class="f6"><label>Название</label><input id="${prefix}Title" value="${esc(t.title||'')}" placeholder="Например: записать Никиту"></div><div class="f3"><label>Дата</label><input id="${prefix}Date" type="date" value="${t.date||''}"></div><div class="f3"><label>Время</label><input id="${prefix}Time" type="time" value="${t.time||''}"></div><div class="f12"><label>Описание / заметка</label><textarea id="${prefix}Desc" placeholder="Детали только для тебя">${esc(t.desc||'')}</textarea></div><div class="f4"><label>Сфера / категория</label><select id="${prefix}Cat" onchange="applyCatDefaults('${prefix}')">${cats.map(c=>`<option ${t.category===c?'selected':''}>${c}</option>`).join('')}</select><div class="small" id="${prefix}CatHint">Психолог, продукты, учёба, дом, семья, здоровье, красота, поездки и отдых — отдельно.</div></div><div class="f4"><label>Важность</label><select id="${prefix}Imp"><option ${t.importance==='Обычная'?'selected':''}>Обычная</option><option ${t.importance==='Высокая'?'selected':''}>Высокая</option><option ${t.importance==='Низкая'?'selected':''}>Низкая</option></select></div><div class="f4"><label>Напомнить</label><select id="${prefix}Rem"><option value="0">не напоминать</option><option value="5" ${t.reminder==5?'selected':''}>за 5 минут</option><option value="15" ${t.reminder==15?'selected':''}>за 15 минут</option><option value="60" ${t.reminder==60?'selected':''}>за 1 час</option><option value="1440" ${t.reminder==1440?'selected':''}>за день</option></select></div><div class="f6"><label>Google Calendar</label><select id="${prefix}Gcal"><option value="none">не отправлять</option><option value="private" ${t.syncGcal==='private'?'selected':''}>отправить как “Личное дело”</option><option value="title" ${t.syncGcal==='title'?'selected':''}>отправить с названием</option></select><div class="small">Можно сохранить выбор заранее. В Google уйдёт только когда есть дата и время.</div></div><div class="f6"><label>Фокус</label><div class="switch"><input type="checkbox" id="${prefix}Focus" ${t.focus?'checked':''}> <span>показать в 3 главных делах</span></div></div><div class="f12 btns"><button class="primary" onclick="saveTask('${t.id||''}','${prefix}')">${t.id?'Сохранить':'Добавить задачу'}</button><button onclick="syncSelectedToGoogle()">Отправить важное в Google</button></div></div>`}
function applyCatDefaults(prefix='task'){const c=val(prefix+'Cat'); if(areaInfo[c]){const hint=document.getElementById(prefix+'CatHint'); if(hint)hint.textContent=areaInfo[c].hint; const g=document.getElementById(prefix+'Gcal'); if(g&&g.value==='none') g.value=areaInfo[c].privacy||'none';}}
function readTaskForm(id,prefix='task'){return{id:id||uid(),title:val(prefix+'Title').trim(),date:val(prefix+'Date'),time:val(prefix+'Time'),desc:val(prefix+'Desc').trim(),category:val(prefix+'Cat'),importance:val(prefix+'Imp'),reminder:Number(val(prefix+'Rem')),syncGcal:val(prefix+'Gcal'),focus:document.getElementById(prefix+'Focus').checked,done:false,createdAt:id?(data.tasks.find(x=>x.id===id)||{}).createdAt||new Date().toISOString():new Date().toISOString(),googleEventId:id?(data.tasks.find(x=>x.id===id)||{}).googleEventId:null}}
function val(id){const el=document.getElementById(id); return el?el.value:''}

function normalizeText(x){return String(x||'').toLowerCase().replace(/ё/g,'е')}
function detectCategory(text){const t=normalizeText(text); const rules=[
  ['Психолог',/(психолог|терапи|сесс|тревог|эмоци|чувств|обсудить|обсужд|психик|страх|злост|обид|границ|ресурс)/],
  ['Продукты',/(купить|докупить|продукт|магазин|супермаркет|еда|молок|хлеб|яйц|сыр|мяс|куриц|рыб|овощ|фрукт|круп|макарон|сахар|кофе|чай|конфет|йогурт|творог|масло)/],
  ['Учёба',/(курс|учеб|учеба|учебы|урок|домашк|домашнее|гайд|видео|модул|нейро|промпт|портфолио|практик|обуч|задани|сербск|английск|язык|грамматик|слова|словар|аудирован|произнош)/],
  ['Дом',/(дом|дома|уборк|убрать|посуд|стирк|постирать|белье|кухн|готовк|готовить|приготов|ужин|обед|завтрак|шкаф|ванн|пол|пыль|ремонт|документ|оплатить|счет|квитанц)/],
  ['Семья',/(семь|леонид|леня|муж|любим|андрей|никит|дет|сын|школ|круж|секци|врач.*дет|логопед|родител|выходн)/],
  ['AI / работа',/(работ|клиент|проект|заказ|пост|контент|инст|рилс|референс|дизайн|генерац|ai|чатgpt|чатджипити|midjourney|миджорни)/],
  ['Здоровье',/(здоров|врач|анализ|лекарств|таблет|метотрексат|фолиев|сустав|ревматолог|аптек|прием|процедур|самочувств|болит|боль|записаться|запись.*врач)/],
  ['Красота',/(красот|маникюр|педикюр|волос|стрижк|окраш|бров|ресниц|косметик|крем|уход|массаж|эпиляц|электроэпиляц|салон|мастер|одежд|платье|обувь|сумк|украшен)/],
  ['Поездки',/(поездк|путешеств|дорог|билет|самолет|аэропорт|вокзал|отель|гостиниц|бронь|чемодан|паспорт|виза|багаж|такси|маршрут)/],
  ['Отдых',/(отдых|отдохн|прогулк|кино|сериал|ванн|релакс|перерыв|восстанов|выспаться|сон|пляж|кафе|парк)/],
  ['Собака',/(джессик|собак|ветеринар|корм|выгул|прививк)/]
]; const found=rules.find(([,re])=>re.test(t)); return found?found[0]:'Личное'}
function stripCommandWords(text,cat){let x=String(text||'').trim(); const patterns={
  'Психолог':/^(для\s+психолога|психологу|к\s+психологу|психолог[:\-]?)/i,
  'Продукты':/^(купить|докупить|в\s+магазин|продукты[:\-]?)/i,
  'Учёба':/^(по\s+(учебе|учёбе|курсу)|для\s+(учебы|учёбы|курса)|учеба[:\-]?|учёба[:\-]?|курс[:\-]?)/i,
  'Дом':/^(для\s+дома|по\s+дому|дом[:\-]?|готовка[:\-]?)/i,
  'Семья':/^(для\s+семьи|по\s+семье|семья[:\-]?|леонид[:\-]?|леня[:\-]?|муж[:\-]?|любимый[:\-]?)/i,
  'AI / работа':/^(для\s+работы|по\s+работе|работа[:\-]?)/i,
  'Здоровье':/^(по\s+здоровью|для\s+здоровья|здоровье[:\-]?|врач[:\-]?)/i,
  'Красота':/^(красота|для\s+красоты|по\s+красоте|маникюр|педикюр|салон)[:\-]?/i,
  'Поездки':/^(поездка|поездки|путешествие|путешествия|дорога|билеты)[:\-]?/i,
  'Отдых':/^(отдых|для\s+отдыха|отдохнуть|перерыв)[:\-]?/i
}; if(patterns[cat]) x=x.replace(patterns[cat],'').trim(); return x||text.trim()}
function parseQuickLine(line,focus=false){let original=line.trim(); let category=detectCategory(original); let title=stripCommandWords(original,category); let date='', time=''; const low=normalizeText(original); const now=new Date();
  if(/\bсегодня\b/.test(low)) date=todayISO();
  if(/\bзавтра\b/.test(low)){const d=new Date();d.setDate(d.getDate()+1);date=d.toISOString().slice(0,10)}
  if(/\bпослезавтра\b/.test(low)){const d=new Date();d.setDate(d.getDate()+2);date=d.toISOString().slice(0,10)}
  const tm=original.match(/(?:в\s*)?(\d{1,2})[.:](\d{2})/); if(tm){time=`${tm[1].padStart(2,'0')}:${tm[2]}`; title=title.replace(tm[0],'').trim()}
  title=title.replace(/\b(сегодня|завтра|послезавтра)\b/ig,'').trim();
  let syncGcal='none'; if(['Психолог','Семья','Здоровье','Красота'].includes(category)) syncGcal='private';
  let importance=focus?'Высокая':'Обычная';
  return {id:uid(),title:title||original,date,time,desc:'',category,importance,reminder:0,syncGcal,focus,done:false,createdAt:new Date().toISOString(),googleEventId:null}
}
function quickSmartAdd(focus=false){const el=document.getElementById('quickInput'); if(!el)return; const lines=el.value.split('\n').map(x=>x.trim()).filter(Boolean); if(!lines.length)return toast('Напиши дело в быструю строку'); const tasks=lines.map(x=>parseQuickLine(x,focus)); data.tasks.unshift(...tasks); save(); el.value=''; render(); toast(`Быстро добавлено: ${tasks.length}`)}
function quickPreview(){const el=document.getElementById('quickInput'), out=document.getElementById('quickPreview'); if(!el||!out)return; const lines=el.value.split('\n').map(x=>x.trim()).filter(Boolean); if(!lines.length){out.innerHTML='<span class="chip">Сфера определится автоматически</span>';return} out.innerHTML=lines.slice(0,4).map(x=>{const t=parseQuickLine(x,false); return `<span class="chip">${esc(t.category)} · ${esc(t.title)}${t.date?' · '+fmtDate(t.date):''}${t.time?' '+t.time:''}</span>`}).join('')+(lines.length>4?`<span class="chip">ещё ${lines.length-4}</span>`:'')}
function quickPrefix(prefix){const el=document.getElementById('quickInput'); if(!el)return; if(el.value.trim() && !el.value.endsWith('\n')) el.value+='\n'; el.value+=prefix; el.focus(); quickPreview()}
function clearQuickInput(){const el=document.getElementById('quickInput'); if(el){el.value=''; quickPreview(); el.focus()}}
function quickKey(e){if(e.ctrlKey&&e.key==='Enter'){e.preventDefault(); quickSmartAdd(false)}}
function saveTask(id,prefix='task'){const t=readTaskForm(id,prefix); if(!t.title)return toast('Нужно название задачи'); if(id){const old=data.tasks.findIndex(x=>x.id===id); if(old>=0){t.done=data.tasks[old].done; data.tasks[old]=t}}else data.tasks.unshift(t); save(); closeModal(); render(); if(t.syncGcal!=='none'&&(!t.date||!t.time))toast('Задача сохранена для Google. Добавь дату и время, чтобы отправить в календарь.'); else if(t.syncGcal!=='none')toast('Задача сохранена. В Google отправится по кнопке синхронизации.')}
function editTask(id){const t=data.tasks.find(x=>x.id===id); openModal(`<h2>Редактировать задачу</h2>${taskForm(t,'editTask')}`)}
function toggleTask(id){const t=data.tasks.find(x=>x.id===id); t.done=!t.done; save(); render()} function delTask(id){if(confirm('Удалить задачу?')){data.tasks=data.tasks.filter(t=>t.id!==id);save();render()}}
function brainDump(){const lines=val('brain').split('\n').map(x=>x.trim()).filter(Boolean); const c=document.getElementById('brainCat')?val('brainCat'):'Личное'; lines.forEach(x=>data.tasks.unshift({id:uid(),title:x,desc:'',category:c,importance:'Обычная',reminder:0,syncGcal:'none',focus:false,done:false,createdAt:new Date().toISOString()})); save();render();toast(`Добавлено задач: ${lines.length}`)}
function quickNote(){const txt=val('brain').trim(); if(!txt)return; data.notes.unshift({id:uid(),title:'Быстрая заметка',text:txt,createdAt:new Date().toISOString()}); save();render();toast('Заметка сохранена')}

function ensureFinance(){if(!data.finance)data.finance={budgets:[],expenses:[],goals:[]}; if(!data.finance.budgets)data.finance.budgets=[]; if(!data.finance.expenses)data.finance.expenses=[]; if(!data.finance.goals)data.finance.goals=[]; return data.finance}
function monthISO(){return new Date().toISOString().slice(0,7)}
function money(n){return new Intl.NumberFormat('ru-RU',{maximumFractionDigits:0}).format(Number(n)||0)+' дин.'}
function budgetSpent(cat,month){const f=ensureFinance();return f.expenses.filter(e=>e.category===cat && (e.date||'').slice(0,7)===month).reduce((s,e)=>s+Number(e.amount||0),0)}
function financeMonthMini(){const f=ensureFinance(), m=monthISO(); const rows=f.budgets.filter(b=>b.month===m).slice(0,4); if(!rows.length)return '<div class="empty">Бюджет ещё не задан. Можно заложить деньги по сферам: продукты, дом, красота, здоровье, поездки.</div>'; return rows.map(b=>{const spent=budgetSpent(b.category,b.month), left=Number(b.amount||0)-spent, pct=Math.min(100,Math.round(spent/(Number(b.amount)||1)*100)); return `<div class="subtleBox"><b>${esc(b.category)}</b><div class="soft">Заложено ${money(b.amount)} · потрачено ${money(spent)} · осталось ${money(left)}</div><div class="progress"><div class="bar" style="width:${pct}%"></div></div></div>`}).join('')}
function financeSummaryCards(){const f=ensureFinance(), m=valSafe('financeMonth')||monthISO(); const planned=f.budgets.filter(b=>b.month===m).reduce((s,b)=>s+Number(b.amount||0),0); const spent=f.expenses.filter(e=>(e.date||'').slice(0,7)===m).reduce((s,e)=>s+Number(e.amount||0),0); const target=f.goals.reduce((s,g)=>s+Number(g.target||0),0); const saved=f.goals.reduce((s,g)=>s+Number(g.saved||0),0); return `<section class="card three"><h2>Заложено</h2><div class="metric"><span>на месяц</span><b>${money(planned)}</b></div></section><section class="card three"><h2>Потрачено</h2><div class="metric"><span>за месяц</span><b>${money(spent)}</b></div></section><section class="card three"><h2>Осталось</h2><div class="metric"><span>по бюджетам</span><b>${money(planned-spent)}</b></div></section><section class="card three"><h2>Коплю</h2><div class="metric"><span>цели</span><b>${money(saved)}/${money(target)}</b></div></section>`}
function viewFinance(){ensureFinance(); const m=monthISO(); return `<div class="grid"><section class="card"><h2>💰 Финансы по сферам</h2><div class="subtleBox"><b>Идея:</b> ты задаёшь, сколько денег заложено на сферу, записываешь траты и видишь, сколько осталось. Отдельно можно вести цели “на что коплю”.</div><div class="fieldgrid" style="margin-top:12px"><div class="f4"><label>Месяц</label><input id="financeMonth" type="month" value="${m}" onchange="render()"></div></div></section>${financeSummaryCards()}<section class="card two"><h2>➕ Заложить бюджет</h2><div class="fieldgrid"><div class="f6"><label>Сфера</label><select id="budgetCat">${cats.map(c=>`<option>${c}</option>`).join('')}</select></div><div class="f6"><label>Месяц</label><input id="budgetMonth" type="month" value="${m}"></div><div class="f6"><label>Сумма, дин.</label><input id="budgetAmount" type="number" min="0" placeholder="Например: 12000"></div><div class="f6"><label>Комментарий</label><input id="budgetNote" placeholder="Например: продукты на неделю"></div></div><div class="btns"><button class="primary" onclick="addBudget()">Сохранить бюджет</button></div></section><section class="card two"><h2>🧾 Записать трату</h2><div class="fieldgrid"><div class="f6"><label>Сфера</label><select id="expenseCat">${cats.map(c=>`<option>${c}</option>`).join('')}</select></div><div class="f6"><label>Дата</label><input id="expenseDate" type="date" value="${todayISO()}"></div><div class="f6"><label>Сумма, дин.</label><input id="expenseAmount" type="number" min="0" placeholder="Например: 850"></div><div class="f6"><label>На что</label><input id="expenseTitle" placeholder="Например: молоко, хлеб"></div></div><div class="btns"><button class="primary" onclick="addExpense()">Добавить трату</button></div></section><section class="card two"><h2>🐷 На что коплю</h2><div class="fieldgrid"><div class="f6"><label>Цель</label><input id="goalTitle" placeholder="Например: поездка, курс, красота"></div><div class="f6"><label>Сфера</label><select id="goalCat">${cats.map(c=>`<option>${c}</option>`).join('')}</select></div><div class="f6"><label>Нужно, дин.</label><input id="goalTarget" type="number" min="0"></div><div class="f6"><label>Уже есть, дин.</label><input id="goalSaved" type="number" min="0"></div></div><div class="btns"><button class="primary" onclick="addGoal()">Добавить цель</button></div><div class="stack" style="margin-top:12px">${renderGoals()}</div></section><section class="card two"><h2>📊 Остатки по сферам</h2><div class="stack">${renderBudgetRows()}</div></section><section class="card"><h2>Последние траты</h2><div class="stack">${renderExpenses()}</div></section></div>`}
function valSafe(id){const el=document.getElementById(id); return el?el.value:''}
function addBudget(){const f=ensureFinance(); const b={id:uid(),category:val('budgetCat'),month:val('budgetMonth')||monthISO(),amount:Number(val('budgetAmount')),note:val('budgetNote').trim(),createdAt:new Date().toISOString()}; if(!b.amount)return toast('Введи сумму бюджета'); const old=f.budgets.findIndex(x=>x.category===b.category&&x.month===b.month); if(old>=0)f.budgets[old]=b; else f.budgets.unshift(b); save();render();toast('Бюджет сохранён')}
function addExpense(){const f=ensureFinance(); const e={id:uid(),category:val('expenseCat'),date:val('expenseDate')||todayISO(),amount:Number(val('expenseAmount')),title:val('expenseTitle').trim()||'Трата',createdAt:new Date().toISOString()}; if(!e.amount)return toast('Введи сумму траты'); f.expenses.unshift(e); save();render();toast('Трата записана')}
function addGoal(){const f=ensureFinance(); const g={id:uid(),title:val('goalTitle').trim(),category:val('goalCat'),target:Number(val('goalTarget')),saved:Number(val('goalSaved')),createdAt:new Date().toISOString()}; if(!g.title||!g.target)return toast('Введи цель и сумму'); f.goals.unshift(g); save();render();toast('Цель добавлена')}
function renderBudgetRows(){const f=ensureFinance(), m=valSafe('financeMonth')||monthISO(); const rows=f.budgets.filter(b=>b.month===m); if(!rows.length)return '<div class="empty">На этот месяц бюджеты ещё не заданы.</div>'; return rows.map(b=>{const spent=budgetSpent(b.category,b.month), left=Number(b.amount||0)-spent, pct=Math.min(100,Math.round(spent/(Number(b.amount)||1)*100)); return `<div class="subtleBox"><div class="metric"><span><b>${esc(b.category)}</b><br><span class="soft">${esc(b.note||'')}</span></span><b>${money(left)}</b></div><div class="soft">Заложено ${money(b.amount)} · потрачено ${money(spent)}</div><div class="progress"><div class="bar" style="width:${pct}%"></div></div><div class="btns" style="margin-top:8px"><button class="danger" onclick="delBudget('${b.id}')">Удалить бюджет</button></div></div>`}).join('')}
function renderExpenses(){const f=ensureFinance(); if(!f.expenses.length)return '<div class="empty">Пока трат нет.</div>'; return f.expenses.slice(0,20).map(e=>`<div class="subtleBox"><div class="metric"><span><b>${esc(e.title)}</b><br><span class="soft">${esc(e.category)} · ${new Date(e.date+'T00:00:00').toLocaleDateString('ru-RU')}</span></span><b>${money(e.amount)}</b></div><div class="btns"><button class="danger" onclick="delExpense('${e.id}')">Удалить</button></div></div>`).join('')}
function renderGoals(){const f=ensureFinance(); if(!f.goals.length)return '<div class="empty">Пока целей нет.</div>'; return f.goals.map(g=>{const pct=Math.min(100,Math.round((Number(g.saved)||0)/(Number(g.target)||1)*100)); return `<div class="subtleBox"><b>${esc(g.title)}</b><div class="soft">${esc(g.category)} · накоплено ${money(g.saved)} из ${money(g.target)}</div><div class="progress"><div class="bar" style="width:${pct}%"></div></div><div class="btns" style="margin-top:8px"><button onclick="addToGoal('${g.id}')">+ пополнить</button><button class="danger" onclick="delGoal('${g.id}')">Удалить</button></div></div>`}).join('')}
function addToGoal(id){const g=ensureFinance().goals.find(x=>x.id===id); const amount=Number(prompt('Сколько добавить к цели?', '0')); if(!amount)return; g.saved=Number(g.saved||0)+amount; save();render();toast('Цель пополнена')}
function delBudget(id){ensureFinance().budgets=ensureFinance().budgets.filter(x=>x.id!==id);save();render()}
function delExpense(id){ensureFinance().expenses=ensureFinance().expenses.filter(x=>x.id!==id);save();render()}
function delGoal(id){ensureFinance().goals=ensureFinance().goals.filter(x=>x.id!==id);save();render()}

function viewNotes(){return `<div class="grid"><section class="card two"><h2>📝 Новая заметка</h2><label>Заголовок</label><input id="noteTitle" placeholder="Например: идеи для портфолио"><label>Текст</label><textarea id="noteText" placeholder="Можно писать свободно"></textarea><div class="btns"><button class="primary" onclick="addNote()">Сохранить</button></div></section><section class="card two"><h2>Заметки</h2><div class="stack">${data.notes.map(n=>`<div class="note"><h3>${esc(n.title)}</h3><p>${esc(n.text)}</p><div class="btns" style="margin-top:8px"><button onclick="noteToTask('${n.id}')">Сделать задачей</button><button class="danger" onclick="delNote('${n.id}')">Удалить</button></div></div>`).join('')||'<div class="empty">Пока заметок нет.</div>'}</div></section></div>`}
function addNote(){const title=val('noteTitle').trim()||'Заметка'; const text=val('noteText').trim(); if(!text)return toast('Пустую заметку не сохраняю'); data.notes.unshift({id:uid(),title,text,createdAt:new Date().toISOString()}); save();render()} function delNote(id){data.notes=data.notes.filter(n=>n.id!==id);save();render()} function noteToTask(id){const n=data.notes.find(x=>x.id===id); data.tasks.unshift({id:uid(),title:n.title,desc:n.text,category:'Идеи',importance:'Обычная',reminder:0,syncGcal:'none',focus:false,done:false,createdAt:new Date().toISOString()}); save();render();toast('Заметка превращена в задачу')}
function viewCalendar(){const days=[...Array(14)].map((_,i)=>{const d=new Date();d.setDate(d.getDate()+i);return d.toISOString().slice(0,10)});return `<div class="grid"><section class="card"><h2>📅 Ближайшие 14 дней</h2><div class="grid">${days.map(d=>`<div class="calendar-day three"><h3>${fmtDate(d)}</h3><div class="calendar-items">${data.tasks.filter(t=>t.date===d).map(t=>`<span class="chip ${isOverdue(t)?'hot':''}">${t.time||'без времени'} · ${esc(t.title)}</span>`).join('')||'<span class="small">пусто</span>'}</div></div>`).join('')}</div></section><section class="card"><h2>Google занятость</h2><div class="btns"><button onclick="connectGoogle()">Подключить</button><button onclick="loadGoogleEvents()">Обновить</button></div><div class="stack" style="margin-top:10px">${renderGcalEvents()}</div></section></div>`}
function renderGcalEvents(){if(!data.gcalEvents?.length)return '<div class="empty">События из Google пока не загружены. Можно показывать только занятость, не превращая её в задачи.</div>'; return data.gcalEvents.slice(0,12).map(e=>`<div class="subtleBox"><b>${esc(e.summary||'Занято')}</b><div class="soft">${new Date(e.start).toLocaleString('ru-RU')} — ${e.end?new Date(e.end).toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit'}):''}</div></div>`).join('')}
function viewSettings(){const g=data.settings.github, gg=data.settings.google;return `<div class="grid"><section class="card two"><h2>🔄 GitHub Sync</h2><div class="fieldgrid"><div class="f6"><label>Owner</label><input id="ghOwner" value="${esc(g.owner)}"></div><div class="f6"><label>Repo</label><input id="ghRepo" value="${esc(g.repo)}"></div><div class="f4"><label>Branch</label><input id="ghBranch" value="${esc(g.branch)}"></div><div class="f4"><label>Файл</label><input id="ghFile" value="${esc(g.file)}"></div><div class="f12"><label>GitHub token</label><input id="ghToken" type="password" value="${esc(g.token)}" placeholder="токен хранится только в браузере"></div></div><div class="btns"><button onclick="saveSettings()">Сохранить настройки</button><button class="good" onclick="pullGithub()">Из облака</button><button class="primary" onclick="pushGithub()">В облако</button></div><p class="soft">Защита: пустые данные не отправляются в облако.</p></section><section class="card two"><h2>📅 Google Calendar</h2><label>OAuth Client ID</label><input id="googleClient" value="${esc(gg.clientId)}" placeholder="...apps.googleusercontent.com"><label>Calendar ID</label><input id="googleCal" value="${esc(gg.calendarId||'primary')}"><label>По умолчанию отправлять</label><select id="googlePrivacy"><option value="private" ${gg.privacyDefault==='private'?'selected':''}>как “Личное дело”</option><option value="title" ${gg.privacyDefault==='title'?'selected':''}>с названием задачи</option></select><div class="btns"><button onclick="saveSettings()">Сохранить</button><button class="primary" onclick="connectGoogle()">Подключить Google</button><button onclick="syncSelectedToGoogle()">Синхронизировать важное</button></div><p class="soft">В Google уходят только задачи, где выбран Google Calendar, и только дата/время + безопасное название.</p></section><section class="card"><h2>🔔 Уведомления</h2><div class="btns"><button onclick="requestNotifications()">Разрешить уведомления</button><button onclick="testNotification()">Тест</button></div><p class="soft">Локальные уведомления надёжнее, когда приложение открыто или недавно запускалось. Для важных дел лучше использовать Google Calendar.</p></section><section class="card"><h2>💾 Данные</h2><div class="btns"><button onclick="exportData()">Скачать JSON</button><button class="danger" onclick="resetApp()">Сбросить локально</button></div></section></div>`}
function saveSettings(){data.settings.github={owner:val('ghOwner')||'',repo:val('ghRepo')||'',branch:val('ghBranch')||'main',file:val('ghFile')||'organizer.json',token:val('ghToken')||''};data.settings.google={clientId:val('googleClient')||'',calendarId:val('googleCal')||'primary',privacyDefault:val('googlePrivacy')||'private'};save();toast('Настройки сохранены')}
async function githubReq(method,path,body){const g=data.settings.github; const url=`https://api.github.com/repos/${g.owner}/${g.repo}/contents/${g.file}${method==='GET'?`?ref=${g.branch}`:''}`; const res=await fetch(url,{method,headers:{Authorization:`Bearer ${g.token}`,Accept:'application/vnd.github+json'},body:body?JSON.stringify(body):undefined}); if(!res.ok)throw new Error(await res.text()); return res.json()}
async function pullGithub(){try{saveSettings();const r=await githubReq('GET'); const json=JSON.parse(decodeURIComponent(escape(atob(r.content.replace(/\n/g,''))))); data={...structuredClone(defaultData),...json, settings:{...data.settings,...json.settings, github:data.settings.github}}; data.dirty=false; hardSave(); render();toast('Данные загружены из GitHub')}catch(e){toast('Не получилось загрузить из GitHub. Проверь repo/token.')}}
async function pushGithub(){try{saveSettings(); if(!data.tasks.length&&!data.notes.length)return toast('Пустые данные не отправляю в облако'); let sha=null; try{const old=await githubReq('GET'); sha=old.sha}catch(e){} const payload={...data,dirty:false,lastSync:new Date().toISOString()}; const content=btoa(unescape(encodeURIComponent(JSON.stringify(payload,null,2)))); await githubReq('PUT','',{message:`Update organizer ${new Date().toISOString()}`,content,branch:data.settings.github.branch,sha}); data.dirty=false; data.lastSync=new Date().toISOString(); hardSave();render();toast('Данные отправлены в GitHub')}catch(e){toast('Не получилось отправить в GitHub')}}
function connectGoogle(){saveSettings(); const clientId=data.settings.google.clientId; if(!clientId)return toast('Сначала вставь Google OAuth Client ID в настройках'); if(!window.google?.accounts?.oauth2)return toast('Google скрипт ещё не загрузился или нет интернета'); tokenClient=google.accounts.oauth2.initTokenClient({client_id:clientId,scope:'https://www.googleapis.com/auth/calendar.events https://www.googleapis.com/auth/calendar.readonly',callback:(resp)=>{if(resp.error){toast('Google вход не удался');return} googleToken=resp.access_token; renderStatus(); toast('Google подключён')}}); tokenClient.requestAccessToken({prompt:'consent'});}
async function gFetch(url,opts={}){if(!googleToken){connectGoogle(); throw new Error('no token')} const res=await fetch(url,{...opts,headers:{Authorization:`Bearer ${googleToken}`,'Content-Type':'application/json',...(opts.headers||{})}}); if(!res.ok)throw new Error(await res.text()); return res.json()}
async function loadGoogleEvents(){try{if(!googleToken){connectGoogle();return} const now=new Date(), max=new Date(); max.setDate(max.getDate()+7); const cal=encodeURIComponent(data.settings.google.calendarId||'primary'); const url=`https://www.googleapis.com/calendar/v3/calendars/${cal}/events?timeMin=${now.toISOString()}&timeMax=${max.toISOString()}&singleEvents=true&orderBy=startTime`; const r=await gFetch(url); data.gcalEvents=(r.items||[]).map(e=>({id:e.id,summary:e.summary,start:e.start.dateTime||e.start.date,end:e.end?.dateTime||e.end?.date})); hardSave(); render(); toast('Занятость из Google обновлена')}catch(e){toast('Не удалось прочитать Google Calendar')}}
async function syncSelectedToGoogle(){try{if(!googleToken){connectGoogle();toast('После входа в Google нажми синхронизацию ещё раз.');return} const selected=data.tasks.filter(t=>!t.done&&t.syncGcal&&t.syncGcal!=='none'); const list=selected.filter(t=>t.title&&t.date&&t.time); const skipped=selected.length-list.length; if(!list.length)return toast(selected.length?'Для отправки в Google нужны название, дата и время':'Нет задач, где выбран Google Calendar'); for(const t of list){await upsertGcal(t)} save(); render(); toast(`В Google синхронизировано: ${list.length}${skipped?`, пропущено без даты/времени: ${skipped}`:''}`)}catch(e){console.error(e); const msg=String(e.message||e); if(msg.includes('invalid_client'))toast('Google Client ID не принят. Проверь OAuth Client ID.'); else if(msg.includes('insufficient')||msg.includes('permission'))toast('Google не дал нужные права календаря. Подключи Google заново.'); else toast('Google синхронизация не удалась. Проверь вход, Client ID и дату/время задачи.')}}
async function upsertGcal(t){if(!t.title||!t.date||!t.time)throw new Error('missing task fields'); const start=new Date(`${t.date}T${t.time}:00`); const end=new Date(start.getTime()+30*60000); const summary=t.syncGcal==='title'?(t.title||'Личное дело'):'Личное дело'; const event={summary,description:t.syncGcal==='title'?`Создано из органайзера. Категория: ${t.category}`:'Создано из личного органайзера. Детали остаются внутри приложения.',start:{dateTime:start.toISOString()},end:{dateTime:end.toISOString()},reminders:t.reminder?{useDefault:false,overrides:[{method:'popup',minutes:Number(t.reminder)}]}:{useDefault:true}}; const cal=encodeURIComponent(data.settings.google.calendarId||'primary'); if(t.googleEventId){await gFetch(`https://www.googleapis.com/calendar/v3/calendars/${cal}/events/${t.googleEventId}`,{method:'PUT',body:JSON.stringify(event)})}else{const r=await gFetch(`https://www.googleapis.com/calendar/v3/calendars/${cal}/events`,{method:'POST',body:JSON.stringify(event)}); t.googleEventId=r.id}}
function requestNotifications(){if(!('Notification'in window))return toast('Браузер не поддерживает уведомления'); Notification.requestPermission().then(p=>toast(p==='granted'?'Уведомления разрешены':'Уведомления не разрешены'))} function testNotification(){if(Notification.permission==='granted')new Notification('Мой органайзер',{body:'Тестовое напоминание работает 🌷'});else requestNotifications()}
function startReminderLoop(){clearInterval(notificationTimer); notificationTimer=setInterval(()=>{if(Notification.permission!=='granted')return; const now=new Date(); data.tasks.forEach(t=>{if(t.done||!t.date||!t.time||!t.reminder)return; const fire=new Date(taskDateTime(t).getTime()-remindMs(t)); const key='notified_'+t.id+'_'+t.date+t.time+t.reminder; if(Math.abs(now-fire)<30000&&!localStorage.getItem(key)){new Notification(t.title,{body:`Напоминание: ${fmtDate(t.date)} ${t.time}`});localStorage.setItem(key,'1')}})},30000)}
function exportData(){const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([JSON.stringify(data,null,2)],{type:'application/json'}));a.download='organizer-backup.json';a.click()} function resetApp(){if(confirm('Стереть локальные данные? GitHub не трогаю.')){localStorage.removeItem(STORAGE);location.reload()}}
function openModal(html){document.getElementById('modal').innerHTML=`<div class="card"><div class="btns" style="justify-content:flex-end"><button onclick="closeModal()">Закрыть</button></div>${html}</div>`;document.getElementById('modal').classList.remove('hidden')} function closeModal(){document.getElementById('modal').classList.add('hidden')}
function esc(s){return String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
window.addEventListener('online',renderStatus);window.addEventListener('offline',renderStatus); if('serviceWorker'in navigator) navigator.serviceWorker.register('sw.js'); startReminderLoop(); render();
</script>
</body>
